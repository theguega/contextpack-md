site_name: contextpack-md
site_url: https://theguega.github.io/contextpack-md/
repo_url: https://github.com/theguega/contextpack-md
edit_uri: edit/main/docs/

theme:
    name: material
    palette:
        - scheme: default
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-7
              name: Switch to dark mode
        - scheme: slate
          primary: indigo
          accent: indigo
          toggle:
              icon: material/brightness-4
              name: Switch to light mode
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy
        - content.code.annotate

plugins:
    - search
    - mkdocstrings:
          handlers:
              python:
                  paths: [src]
                  import_timeout: 60
                  options:
                      show_source: true
                      show_root_heading: true
                      show_category_heading: true
                      show_labels: true

nav:
    - Home: index.md
    - Usage: usage.md
    - API Reference: api.md
    - Contributing: contributing.md

markdown_extensions:
    - admonition
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
          alternate_style: true
    - pymdownx.details
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
