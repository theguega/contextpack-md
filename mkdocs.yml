site_name: contextpack-md
site_url: https://theguega.github.io/contextpack-md/
repo_url: https://github.com/theguega/contextpack-md
edit_uri: edit/main/docs/

theme:
    name: readthedocs

plugins:
    - search
    - mkdocstrings:
          handlers:
              python:
                  paths: [src]
                  options:
                      show_source: true
                      show_root_heading: true
                      show_category_heading: true
                      show_labels: true

nav:
    - Home: index.md
    - Usage: usage.md
    - API Reference: api.md
    - Contributing: contributing.md

markdown_extensions:
    - admonition
    - pymdownx.highlight:
          anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.details
