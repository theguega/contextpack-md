name: release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write

jobs:
    build-and-publish:
        name: Build and publish to PyPI
        runs-on: ubuntu-latest
        environment:
            name: pypi
        steps:
            - uses: actions/checkout@v5

            - name: Install uv
              uses: astral-sh/setup-uv@v6

            - name: Bump version
              run: uv version --bump patch

            - name: Build wheel and sdist
              run: uv build

            - name: Publish
              run: uv publish
              env:
                  UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}

    build-binary:
        name: Build standalone binary
        needs: build-and-publish
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
                include:
                    - os: ubuntu-latest
                      suffix: linux-x86_64
                    - os: macos-latest
                      suffix: macos-x86_64
                    - os: windows-latest
                      suffix: windows-x86_64.exe
        steps:
            - uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v5

            - name: Build binary using pyapp
              run: |
                  uvx pyapp build
              env:
                  PYAPP_PROJECT_NAME: contextpack-md
                  PYAPP_EXECUTABLE_NAME: contextpack-md

            - name: Rename binary
              shell: bash
              run: |
                  mv contextpack-md* contextpack-md-${{ matrix.suffix }}

            - name: Upload binary artifact
              uses: actions/upload-artifact@v4
              with:
                  name: binary-${{ matrix.os }}
                  path: contextpack-md-${{ matrix.suffix }}

    github-release:
        name: Create GitHub Release
        needs: [build-and-publish, build-binary]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/*
                  generate_release_notes: true
